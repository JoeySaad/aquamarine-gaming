<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HyperBall</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Courier New',monospace;overflow:hidden;}
  canvas{display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 520;
canvas.width = W; canvas.height = H;

// ── Audio ──────────────────────────────────────────────
const aCtx = new (window.AudioContext||window.webkitAudioContext)();
const SETTINGS_KEY='hyperball-settings-v1';
const ACH_KEY='hyperball-achievements-v1';
const defaultSettings={sound:true,volume:0.55};
let settings=loadSettings();

function loadSettings(){
  try{return {...defaultSettings,...JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')};}
  catch(e){return {...defaultSettings};}
}
function saveSettings(){
  try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings));}
  catch(e){}
}
function playTone(freq,type,dur,vol=0.25){
  if(!settings.sound||settings.volume<=0)return;
  const o=aCtx.createOscillator(),g=aCtx.createGain();
  o.connect(g);g.connect(aCtx.destination);
  o.type=type;o.frequency.setValueAtTime(freq,aCtx.currentTime);
  g.gain.setValueAtTime(vol*settings.volume,aCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,aCtx.currentTime+dur);
  o.start();o.stop(aCtx.currentTime+dur);
}
function playNoise(dur=0.08,vol=0.16){
  if(!settings.sound||settings.volume<=0)return;
  const samples=Math.max(1,Math.floor(aCtx.sampleRate*dur));
  const buffer=aCtx.createBuffer(1,samples,aCtx.sampleRate);
  const data=buffer.getChannelData(0);
  for(let i=0;i<samples;i++)data[i]=(Math.random()*2-1)*(1-i/samples);
  const src=aCtx.createBufferSource(),g=aCtx.createGain();
  src.buffer=buffer;src.connect(g);g.connect(aCtx.destination);
  g.gain.setValueAtTime(vol*settings.volume,aCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,aCtx.currentTime+dur);
  src.start();src.stop(aCtx.currentTime+dur);
}
function playChord(notes,type='sine',dur=0.16,vol=0.14){
  notes.forEach((f,i)=>setTimeout(()=>playTone(f,type,dur,vol),i*55));
}
function sndButton(){playTone(520,'triangle',0.045,0.12);}
function sndMenu(){playTone(360,'sine',0.06,0.12);}
function sndPause(){playTone(260,'triangle',0.08,0.16);}
function sndResume(){playChord([300,420],'triangle',0.09,0.14);}
function sndPaddle(hits=0){playTone(220+Math.min(hits,80)*3,'square',0.08,0.25);}
function sndWall(){playTone(180,'sine',0.07,0.12);}
function sndScore(){playTone(150,'sawtooth',0.12,0.28);setTimeout(()=>playTone(100,'sawtooth',0.2,0.28),120);}
function sndStart(){[300,400,600].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.15,0.2),i*100));}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.25,0.35),i*120));}
function sndLose(){playChord([220,165,110],'sawtooth',0.18,0.2);}
function sndPowerup(){playTone(800,'sine',0.05,0.2);setTimeout(()=>playTone(1200,'sine',0.1,0.2),60);}
function sndStun(){playTone(80,'sawtooth',0.3,0.3);}
function sndFire(){playNoise(0.2,0.14);playChord([480,640,820],'sawtooth',0.08,0.12);}
function sndAchievement(){playChord([660,880,990,1320],'triangle',0.18,0.18);}

// ── State ──────────────────────────────────────────────
// screens: 'menu' | 'modeSelect' | 'game' | 'gameover'
let screen = 'menu';
let selectedMode = 'classic'; // classic | hyper | charged
let opponent = 'human'; // human | easy | medium | hard
let menuTab='play'; // play | settings | achievements
let pauseTab='pause'; // pause | settings
let lastFrameTime=performance.now();
let currentSessionMs=0;
let lastAchievementSave=performance.now();
let achievementsScroll=0;
let matchStats=null;

// ── Constants ─────────────────────────────────────────
const PAD_W=14,PAD_H=100,PAD_SPEED=5,PAD_R=7;
const TRAIL_LEN=8;
const WIN_SCORE=7;
const BALL_R=6;

const achievements=[
  {id:'welcome',name:'Welcome to Pong',desc:'Finish your first match'},
  {id:'firstRally',name:'First Rally',desc:'Hit the ball 10 times in one round'},
  {id:'winnerWinner',name:'Winner Winner',desc:'Win a game against any CPU'},
  {id:'closeOne',name:'Close One',desc:'Win by 1 point'},
  {id:'shutout',name:'Shutout',desc:'Win without letting the opponent score'},
  {id:'retroRookie',name:'Retro Rookie',desc:'Beat Easy CPU in Classic'},
  {id:'arcadeContender',name:'Arcade Contender',desc:'Beat Medium CPU in Classic'},
  {id:'classicConqueror',name:'Classic Conqueror',desc:'Beat Hard CPU in Classic'},
  {id:'hyperSpark',name:'Hyper Spark',desc:'Beat Easy CPU in Hyper'},
  {id:'momentumMaster',name:'Momentum Master',desc:'Beat Medium CPU in Hyper'},
  {id:'terminalVelocity',name:'Terminal Velocity',desc:'Beat Hard CPU in Hyper'},
  {id:'chargedUp',name:'Charged Up',desc:'Beat Easy CPU in Charged'},
  {id:'overclocked',name:'Overclocked',desc:'Beat Medium CPU in Charged'},
  {id:'absoluteOverload',name:'Absolute Overload',desc:'Beat Hard CPU in Charged'},
  {id:'friendlyRivalry',name:'Friendly Rivalry',desc:'Play local multiplayer'},
  {id:'bestOfThree',name:'Best of Three',desc:'Win a multiplayer set'},
  {id:'comebackKid',name:'Comeback Kid',desc:'Come back from a 5-point deficit'},
  {id:'pingPong',name:'Ping... Pong...',desc:'Rally exactly 2 hits before scoring'},
  {id:'slowMiss',name:'How Did You Miss That?',desc:'Miss a super slow ball'},
  {id:'afkVictory',name:'AFK Victory',desc:"Opponent scores an own goal while you don't move"},
  {id:'marathonRally',name:'Marathon Rally',desc:'Reach a 50-hit rally in Classic'},
  {id:'breakingPhysics',name:'Breaking Physics',desc:'Reach 100 consecutive hits in Hyper mode'},
  {id:'collector',name:'Collector',desc:'Use every powerup at least once in Charged mode'},
  {id:'classicChampion',name:'Classic Champion',desc:'Win 25 Classic games'},
  {id:'oneMoreGame',name:'One More Game',desc:'Play for an hour straight'},
  {id:'touchGrass',name:'Touch Grass',desc:'Lose 10 games in a row'},
  {id:'dedicatedPlayer',name:'Dedicated Player',desc:'Play 100 matches'},
  {id:'aroundWorld',name:'Around the World',desc:'Play every mode 50 times'},
  {id:'bounces10000',name:'10,000 Bounces Later',desc:'Reach 10,000 total paddle hits'},
  {id:'pongVeteran',name:'Pong Veteran',desc:'Win 250 games'},
  {id:'aiDestroyer',name:'AI Destroyer',desc:'Beat every CPU difficulty in all modes'}
];

const achievementState=loadAchievementState();

function makeDefaultAchievementState(){
  return {
    unlocked:{},
    stats:{
      matches:0,wins:0,losses:0,lossStreak:0,classicWins:0,totalHits:0,
      longestSessionMs:0,modePlays:{classic:0,hyper:0,charged:0},
      cpuWins:{classic:{easy:false,medium:false,hard:false},hyper:{easy:false,medium:false,hard:false},charged:{easy:false,medium:false,hard:false}},
      powerupsUsed:{}
    }
  };
}

function loadAchievementState(){
  try{return mergeAchievementState(makeDefaultAchievementState(),JSON.parse(localStorage.getItem(ACH_KEY)||'{}'));}
  catch(e){return makeDefaultAchievementState();}
}

function mergeAchievementState(base,saved){
  base.unlocked={...base.unlocked,...(saved.unlocked||{})};
  const s=saved.stats||{};
  base.stats={...base.stats,...s};
  base.stats.modePlays={...base.stats.modePlays,...(s.modePlays||{})};
  base.stats.powerupsUsed={...base.stats.powerupsUsed,...(s.powerupsUsed||{})};
  ['classic','hyper','charged'].forEach(m=>base.stats.cpuWins[m]={...base.stats.cpuWins[m],...((s.cpuWins||{})[m]||{})});
  return base;
}

function saveAchievements(){
  try{localStorage.setItem(ACH_KEY,JSON.stringify(achievementState));}
  catch(e){}
}

function unlockAchievement(id){
  if(achievementState.unlocked[id])return;
  achievementState.unlocked[id]=Date.now();
  saveAchievements();
  sndAchievement();
}

function recordPaddleHit(){
  achievementState.stats.totalHits++;
  if(matchStats){
    matchStats.maxRally=Math.max(matchStats.maxRally,totalHits);
    if(selectedMode==='classic'&&totalHits>=50)unlockAchievement('marathonRally');
    if(selectedMode==='hyper'&&totalHits>=100)unlockAchievement('breakingPhysics');
    if(selectedMode==='hyper'&&totalHits>=25&&!matchStats.fire25){matchStats.fire25=true;sndFire();}
    if(selectedMode==='hyper'&&totalHits>=50&&!matchStats.fire50){matchStats.fire50=true;sndFire();}
  }
  if(totalHits>=10)unlockAchievement('firstRally');
}

function recordPowerup(type){
  achievementState.stats.powerupsUsed[type]=true;
  if(typeof POWERUP_TYPES!=='undefined'&&POWERUP_TYPES.every(t=>achievementState.stats.powerupsUsed[t]))unlockAchievement('collector');
}

function updateSessionStats(deltaMs){
  if(screen==='game'&&gameState==='playing'){
    currentSessionMs+=deltaMs;
    achievementState.stats.longestSessionMs=Math.max(achievementState.stats.longestSessionMs,currentSessionMs);
    if(currentSessionMs>=3600000)unlockAchievement('oneMoreGame');
    if(performance.now()-lastAchievementSave>5000){
      lastAchievementSave=performance.now();
      saveAchievements();
    }
  }
}

function checkLongTermAchievements(){
  const s=achievementState.stats;
  if(s.classicWins>=25)unlockAchievement('classicChampion');
  if(s.lossStreak>=10)unlockAchievement('touchGrass');
  if(s.matches>=100)unlockAchievement('dedicatedPlayer');
  if(Math.min(s.modePlays.classic,s.modePlays.hyper,s.modePlays.charged)>=50)unlockAchievement('aroundWorld');
  if(s.totalHits>=10000)unlockAchievement('bounces10000');
  if(s.wins>=250)unlockAchievement('pongVeteran');
  if(['classic','hyper','charged'].every(m=>['easy','medium','hard'].every(d=>s.cpuWins[m][d])))unlockAchievement('aiDestroyer');
}

function finishMatch(){
  const p1Win=p1.score>p2.score;
  const cpuMatch=opponent!=='human';
  const s=achievementState.stats;
  s.matches++;
  s.modePlays[selectedMode]++;
  if(p1Win){s.wins++;s.lossStreak=0;}else{s.losses++;s.lossStreak++;}

  unlockAchievement('welcome');
  if(opponent==='human')unlockAchievement('friendlyRivalry');
  if(opponent==='human'&&p1Win)unlockAchievement('bestOfThree');
  if(p1Win&&cpuMatch)unlockAchievement('winnerWinner');
  if(p1Win&&Math.abs(p1.score-p2.score)===1)unlockAchievement('closeOne');
  if(p1Win&&p2.score===0)unlockAchievement('shutout');
  if(p1Win&&matchStats&&matchStats.comebackEligible)unlockAchievement('comebackKid');

  if(p1Win&&cpuMatch){
    s.cpuWins[selectedMode][opponent]=true;
    const map={
      classic:{easy:'retroRookie',medium:'arcadeContender',hard:'classicConqueror'},
      hyper:{easy:'hyperSpark',medium:'momentumMaster',hard:'terminalVelocity'},
      charged:{easy:'chargedUp',medium:'overclocked',hard:'absoluteOverload'}
    };
    unlockAchievement(map[selectedMode][opponent]);
  }
  if(p1Win&&selectedMode==='classic')s.classicWins++;

  checkLongTermAchievements();
  saveAchievements();
  p1Win?sndWin():sndLose();
}

function achievementProgress(id){
  const s=achievementState.stats;
  if(achievementState.unlocked[id])return 100;
  if(id==='welcome')return Math.min(100,s.matches*100);
  if(id==='classicChampion')return Math.min(100,s.classicWins/25*100);
  if(id==='oneMoreGame')return Math.min(100,Math.max(s.longestSessionMs,currentSessionMs)/3600000*100);
  if(id==='touchGrass')return Math.min(100,s.lossStreak/10*100);
  if(id==='dedicatedPlayer')return Math.min(100,s.matches/100*100);
  if(id==='aroundWorld')return Math.min(100,Math.min(s.modePlays.classic,s.modePlays.hyper,s.modePlays.charged)/50*100);
  if(id==='bounces10000')return Math.min(100,s.totalHits/10000*100);
  if(id==='pongVeteran')return Math.min(100,s.wins/250*100);
  if(id==='aiDestroyer'){
    let won=0;
    ['classic','hyper','charged'].forEach(m=>['easy','medium','hard'].forEach(d=>{if(s.cpuWins[m][d])won++;}));
    return won/9*100;
  }
  return 0;
}

function unlockedCount(){return achievements.filter(a=>achievementState.unlocked[a.id]).length;}

// ── Game objects ──────────────────────────────────────
let p1,p2,balls,totalHits,fireParticles,powerups,activePowerups;

function initGame(){
  p1={x:20,y:H/2-PAD_H/2,h:PAD_H,score:0,up:false,down:false,trail:[],stun:0,color:'#4488ff',glow:'#4488ff'};
  p2={x:W-20-PAD_W,y:H/2-PAD_H/2,h:PAD_H,score:0,up:false,down:false,trail:[],stun:0,color:'#ff4444',glow:'#ff4444'};
  balls=[makeBall()];
  totalHits=0;
  fireParticles=[];
  powerups=[];
  activePowerups=[];
  powerupTimer=0;
  matchStats={
    mode:selectedMode,opponent,startedAt:performance.now(),maxRally:0,lastRally:0,
    movedThisPoint:false,movedDuringMatch:false,slowMiss:false,comebackEligible:false,
    bestP1Deficit:0,scoredOwnGoal:false,fire25:false,fire50:false
  };
}

function makeBall(dir=(Math.random()<0.5?1:-1)){
  const baseSpeed = selectedMode==='hyper'?1.25:2.2;
  const angle=(Math.random()*40-20)*Math.PI/180;
  return{x:W/2,y:H/2,vx:dir*baseSpeed*Math.cos(angle),vy:baseSpeed*Math.sin(angle),speed:baseSpeed,spin:0};
}

// ── Input ─────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();
  if(e.code==='Space'){
    if(e.repeat)return;
    if(screen==='game'){sndButton();togglePause();}
    else if(screen==='gameover'){sndButton();returnToMainMenu();}
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// click for menu
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width);
  const my=(e.clientY-r.top)*(H/r.height);
  handleClick(mx,my);
});

canvas.addEventListener('wheel',e=>{
  if(screen==='menu'&&menuTab==='achievements'){
    e.preventDefault();
    const max=Math.max(0,achievements.length-10);
    achievementsScroll=Math.max(0,Math.min(max,achievementsScroll+(e.deltaY>0?1:-1)));
  }
},{passive:false});

// ── Menu layout ───────────────────────────────────────
const modeCards=[
  {id:'classic',label:'Classic',desc:'Pure pong. No frills.',color:'#aaaaff'},
  {id:'hyper',label:'Hyper',desc:'Ball speeds up & catches fire!',color:'#ff8844'},
  {id:'charged',label:'Charged',desc:'Power-ups change everything.',color:'#44ffaa'},
];
const oppButtons=[
  {id:'human',label:'Local 2P'},
  {id:'easy',label:'Easy CPU'},
  {id:'medium',label:'Medium CPU'},
  {id:'hard',label:'Hard CPU'},
];

let menuState={hoveredMode:null,hoveredOpp:null};
let modeSelectMode=null;

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width);
  const my=(e.clientY-r.top)*(H/r.height);
  handleHover(mx,my);
});

function getModeCardRect(i){
  const cw=200,ch=120,gap=24;
  const totalW=3*cw+2*gap;
  const sx=(W-totalW)/2;
  return{x:sx+i*(cw+gap),y:200,w:cw,h:ch};
}
function getOppBtnRect(i){
  const bw=160,bh=44,gap=16;
  const totalW=4*bw+3*gap;
  const sx=(W-totalW)/2;
  return{x:sx+i*(bw+gap),y:370,w:bw,h:bh};
}
function getBackRect(){return{x:20,y:20,w:80,h:34};}
function getPauseBtnRect(){return{x:W/2-52,y:14,w:104,h:34};}
function getResumeBtnRect(){return{x:W/2-170,y:H/2+54,w:150,h:42};}
function getMainMenuBtnRect(){return{x:W/2+20,y:H/2+54,w:150,h:42};}
function getPauseSettingsBtnRect(){return{x:W/2-75,y:H/2+104,w:150,h:38};}
function getPauseBackBtnRect(){return{x:W/2-75,y:H/2+116,w:150,h:38};}
function getSettingsPanelTop(){return screen==='game'&&pauseTab==='settings'?H/2-50:170;}
function getSettingsToggleRect(){return{x:W/2-120,y:getSettingsPanelTop()+58,w:240,h:42};}
function getVolumeBarRect(){return{x:W/2-150,y:getSettingsPanelTop()+148,w:300,h:12};}
function getMenuTabRects(){
  return [
    {id:'play',label:'PLAY',x:172,y:20,w:120,h:34},
    {id:'settings',label:'SETTINGS',x:310,y:20,w:140,h:34},
    {id:'achievements',label:'ACHIEVEMENTS',x:468,y:20,w:160,h:34}
  ];
}
function getCloseRect(){return{x:W-110,y:20,w:90,h:34};}

function handleHover(mx,my){
  menuState.hoveredMode=null;menuState.hoveredOpp=null;
  if(screen==='menu'){
    modeCards.forEach((m,i)=>{const r=getModeCardRect(i);if(inRect(mx,my,r))menuState.hoveredMode=m.id;});
  }
  if(screen==='modeSelect'){
    oppButtons.forEach((b,i)=>{const r=getOppBtnRect(i);if(inRect(mx,my,r))menuState.hoveredOpp=b.id;});
  }
}

function handleClick(mx,my){
  aCtx.resume();
  sndButton();
  if(screen==='menu'){
    const close=getCloseRect();
    if(inRect(mx,my,close)){closeGame();return;}
    for(const tab of getMenuTabRects()){
      if(inRect(mx,my,tab)){menuTab=tab.id;sndMenu();return;}
    }
    if(menuTab==='settings'){handleSettingsClick(mx,my);return;}
    if(menuTab==='achievements')return;
    modeCards.forEach((m,i)=>{
      const r=getModeCardRect(i);
      if(inRect(mx,my,r)){modeSelectMode=m.id;screen='modeSelect';}
    });
  } else if(screen==='modeSelect'){
    const br=getBackRect();
    if(inRect(mx,my,br)){screen='menu';return;}
    oppButtons.forEach((b,i)=>{
      const r=getOppBtnRect(i);
      if(inRect(mx,my,r)){
        selectedMode=modeSelectMode;
        opponent=b.id;
        startNewGame();
      }
    });
  } else if(screen==='game'){
    if(inRect(mx,my,getPauseBtnRect())){
      togglePause();
      return;
    }
    if(gameState==='paused'){
      if(pauseTab==='settings'){
        if(inRect(mx,my,getPauseBackBtnRect())){pauseTab='pause';return;}
        handleSettingsClick(mx,my);
      } else {
        if(inRect(mx,my,getResumeBtnRect())){
          resumeGame();
          return;
        }
        if(inRect(mx,my,getMainMenuBtnRect())){
          returnToMainMenu();
          return;
        }
        if(inRect(mx,my,getPauseSettingsBtnRect())){
          pauseTab='settings';
          return;
        }
      }
    }
  } else if(screen==='gameover'){
    returnToMainMenu();
  }
}

function inRect(mx,my,r){return mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h;}

function handleSettingsClick(mx,my){
  if(inRect(mx,my,getSettingsToggleRect())){
    settings.sound=!settings.sound;
    saveSettings();
    if(settings.sound)sndResume();
    return;
  }
  const bar=getVolumeBarRect();
  if(mx>=bar.x&&mx<=bar.x+bar.w&&my>=bar.y-14&&my<=bar.y+26){
    settings.volume=Math.max(0,Math.min(1,(mx-bar.x)/bar.w));
    saveSettings();
    sndButton();
  }
}

function closeGame(){
  window.close();
  screen='closed';
  setTimeout(()=>{
    render();
  },80);
}

// ── Game loop state ────────────────────────────────────
let gameState='paused'; // paused | playing
let powerupTimer=0;

function clearHeldKeys(){
  Object.keys(keys).forEach(k=>delete keys[k]);
}

function startNewGame(){
  clearHeldKeys();
  initGame();
  screen='game';
  gameState='paused';
  pauseTab='pause';
  currentSessionMs=0;
}

function resumeGame(){
  if(screen!=='game'||gameState!=='paused')return;
  aCtx.resume();
  sndResume();
  gameState='playing';
  pauseTab='pause';
}

function pauseGame(){
  if(screen==='game'&&gameState==='playing'){
    gameState='paused';
    pauseTab='pause';
    sndPause();
  }
}

function togglePause(){
  if(screen!=='game')return;
  if(gameState==='playing')pauseGame();
  else resumeGame();
}

function returnToMainMenu(){
  clearHeldKeys();
  screen='menu';
  gameState='paused';
  pauseTab='pause';
  menuTab='play';
}

// ── CPU AI ────────────────────────────────────────────
function moveCPU(pad, targetBall){
  const level={
    easy:{speed:0.95,error:78,deadzone:24,lead:0.08},
    medium:{speed:1.55,error:48,deadzone:18,lead:0.18},
    hard:{speed:2.35,error:28,deadzone:12,lead:0.28}
  }[opponent]||{speed:1.4,error:54,deadzone:18,lead:0.14};
  const mode={
    classic:{speed:0.82,error:1.35},
    hyper:{speed:0.92,error:1.25},
    charged:{speed:0.86,error:1.2}
  }[selectedMode]||{speed:1,error:1};

  const ballMovingAway=targetBall.vx<0;
  const diff=level.speed*mode.speed*(ballMovingAway?0.58:1);
  const err=level.error*mode.error;
  const center=pad.y+pad.h/2;
  const predictedY=targetBall.y+targetBall.vy*level.lead*22;
  const target=ballMovingAway?H/2:predictedY+(Math.random()-0.5)*err;
  if(center<target-level.deadzone)pad.y=Math.min(H-pad.h,pad.y+diff);
  else if(center>target+level.deadzone)pad.y=Math.max(0,pad.y-diff);
}

// ── Powerup system ────────────────────────────────────
const POWERUP_TYPES=['grow','shrink','stun','spin','speedburst','multiball'];
const POWERUP_COLORS={grow:'#44ff88',shrink:'#ff4488',stun:'#ffee44',spin:'#44ccff',speedburst:'#ff8800',multiball:'#cc88ff'};
const POWERUP_LABELS={grow:'GROW',shrink:'SHRINK',stun:'STUN',spin:'SPIN',speedburst:'FAST',multiball:'2x BALL'};

function spawnPowerup(){
  const type=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  powerups.push({
    x:W/2+(Math.random()-0.5)*200,
    y:80+Math.random()*(H-160),
    type,life:1,r:14,pulse:0
  });
}

function updatePowerups(){
  powerupTimer++;
  if(powerupTimer>300&&powerups.length<3){powerupTimer=0;spawnPowerup();}

  // check collection
  balls.forEach(b=>{
    for(let i=powerups.length-1;i>=0;i--){
      const pw=powerups[i];
      const dx=b.x-pw.x,dy=b.y-pw.y;
      if(Math.sqrt(dx*dx+dy*dy)<pw.r+BALL_R){
        applyPowerup(pw.type,b);
        powerups.splice(i,1);
        sndPowerup();
      }
    }
  });

  // pulse animation
  powerups.forEach(pw=>pw.pulse=(pw.pulse+0.08)%(Math.PI*2));

  // tick active effects
  for(let i=activePowerups.length-1;i>=0;i--){
    const ap=activePowerups[i];
    ap.timer--;
    if(ap.timer<=0){removePowerup(ap);activePowerups.splice(i,1);}
  }
  if(p1.stun>0)p1.stun--;
  if(p2.stun>0)p2.stun--;
}

function applyPowerup(type,b){
  recordPowerup(type);
  const target=b.vx>0?p2:p1; // hitting toward this paddle, affect that player
  const other=target===p1?p2:p1;
  if(type==='grow'){
    target.h=Math.min(180,target.h+40);
    activePowerups.push({type,pad:target,timer:300,origH:target.h-40});
  } else if(type==='shrink'){
    target.h=Math.max(30,target.h-40);
    activePowerups.push({type,pad:target,timer:300,origH:target.h+40});
  } else if(type==='stun'){
    target.stun=120;sndStun();
  } else if(type==='spin'){
    b.spin=(Math.random()-0.5)*0.18;
    activePowerups.push({type,ball:b,timer:200});
  } else if(type==='speedburst'){
    b.vx*=1.8;b.vy*=1.8;b.speed*=1.8;
    activePowerups.push({type,ball:b,timer:180,origSpeed:b.speed/1.8});
  } else if(type==='multiball'){
    if(balls.length<3)balls.push(makeBall(b.vx>0?1:-1));
    activePowerups.push({type,timer:400});
  }
}

function removePowerup(ap){
  if(ap.type==='grow'||ap.type==='shrink'){ap.pad.h=PAD_H;}
  if(ap.type==='spin'&&ap.ball){ap.ball.spin=0;}
  if(ap.type==='speedburst'&&ap.ball){
    const factor=ap.origSpeed/ap.ball.speed;
    ap.ball.vx*=factor;ap.ball.vy*=factor;ap.ball.speed=ap.origSpeed;
  }
  if(ap.type==='multiball'){balls=balls.slice(0,1);}
}

// ── Ball update ───────────────────────────────────────
function updateBall(b){
  b.x+=b.vx;b.y+=b.vy;
  if(b.spin)b.vy+=b.spin;

  if(b.y-BALL_R<=0){b.y=BALL_R;b.vy=Math.abs(b.vy);sndWall();}
  if(b.y+BALL_R>=H){b.y=H-BALL_R;b.vy=-Math.abs(b.vy);sndWall();}

  // p1 collision
  if(b.vx<0&&b.x-BALL_R<p1.x+PAD_W&&b.x+BALL_R>p1.x&&b.y-BALL_R<p1.y+p1.h&&b.y+BALL_R>p1.y){
    b.x=p1.x+PAD_W+BALL_R;
    const hit=(b.y-(p1.y+p1.h/2))/(p1.h/2);
    const angle=hit*60*Math.PI/180;
    if(selectedMode==='hyper'){b.speed+=0.15;}
    b.vx=b.speed*Math.cos(angle);b.vy=b.speed*Math.sin(angle);
    b.spin*=-0.7;
    totalHits++;recordPaddleHit();sndPaddle(totalHits);
  }
  // p2 collision
  if(b.vx>0&&b.x+BALL_R>p2.x&&b.x-BALL_R<p2.x+PAD_W&&b.y-BALL_R<p2.y+p2.h&&b.y+BALL_R>p2.y){
    b.x=p2.x-BALL_R;
    const hit=(b.y-(p2.y+p2.h/2))/(p2.h/2);
    const angle=hit*60*Math.PI/180;
    if(selectedMode==='hyper'){b.speed+=0.15;}
    b.vx=-(b.speed*Math.cos(angle));b.vy=b.speed*Math.sin(angle);
    b.spin*=-0.7;
    totalHits++;recordPaddleHit();sndPaddle(totalHits);
  }

  if(selectedMode==='hyper'&&totalHits>=25)spawnFireParticle(b);

  // scoring
  if(b.x<0){
    if(matchStats){
      matchStats.lastRally=totalHits;
      if(b.speed<=1.6)matchStats.slowMiss=true;
    }
    p2.score++;return 'p2';
  }
  if(b.x>W){
    if(matchStats){
      matchStats.lastRally=totalHits;
      if(!matchStats.movedThisPoint)matchStats.scoredOwnGoal=true;
    }
    p1.score++;return 'p1';
  }
  return null;
}

// ── Fire particles ────────────────────────────────────
function spawnFireParticle(b){
  if(Math.random()>0.4)return;
  const ultra=totalHits>=50;
  fireParticles.push({
    x:b.x+(Math.random()-0.5)*6,y:b.y+(Math.random()-0.5)*6,
    vx:(Math.random()-0.5)*2.5,vy:-(Math.random()*3+1.5),
    life:1,size:Math.random()*5+3,ultra
  });
}
function updateFireParticles(){
  for(let i=fireParticles.length-1;i>=0;i--){
    const p=fireParticles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=0.045;p.size*=0.97;
    if(p.life<=0)fireParticles.splice(i,1);
  }
}

// ── Paddle movement ───────────────────────────────────
function movePaddles(){
  const primaryBall=balls[0];

  // P1 is always controlled by the player.
  if(p1.stun<=0){
    if(keys['KeyW']){
      p1.y=Math.max(0,p1.y-PAD_SPEED);
      if(matchStats){matchStats.movedThisPoint=true;matchStats.movedDuringMatch=true;}
    }
    if(keys['KeyS']){
      p1.y=Math.min(H-p1.h,p1.y+PAD_SPEED);
      if(matchStats){matchStats.movedThisPoint=true;matchStats.movedDuringMatch=true;}
    }
  }

  // P2 is the CPU only in CPU modes.
  if(opponent!=='human'){
    if(p2.stun<=0)moveCPU(p2,primaryBall);
  } else {
    if(p2.stun<=0){
      if(keys['ArrowUp'])p2.y=Math.max(0,p2.y-PAD_SPEED);
      if(keys['ArrowDown'])p2.y=Math.min(H-p2.h,p2.y+PAD_SPEED);
    }
  }

  // trails
  [p1,p2].forEach(p=>{
    p.trail.unshift({y:p.y,h:p.h});
    if(p.trail.length>TRAIL_LEN)p.trail.length=TRAIL_LEN;
  });
}

// ── Drawing ───────────────────────────────────────────
function roundRect(c,x,y,w,h,r){
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}

function drawPaddle(p){
  const stunFlash=p.stun>0&&Math.floor(p.stun/6)%2===0;
  const col=stunFlash?'#ffee44':p.color;
  ctx.save();ctx.shadowColor=stunFlash?'#ffee44':p.glow;ctx.shadowBlur=22;
  ctx.beginPath();
  roundRect(ctx,p.x,p.y,PAD_W,p.h,PAD_R);
  roundRect(ctx,p.x+4,p.y+4,PAD_W-8,p.h-8,Math.max(0,PAD_R-4));
  ctx.fillStyle=col;ctx.fill('evenodd');ctx.restore();
}

function drawTrail(p){
  p.trail.forEach((t,i)=>{
    const alpha=(1-i/TRAIL_LEN)*0.07;
    ctx.save();ctx.shadowColor=p.color;ctx.shadowBlur=4;
    ctx.globalAlpha=alpha;ctx.fillStyle=p.color;
    ctx.beginPath();
    roundRect(ctx,p.x,t.y,PAD_W,t.h,PAD_R);
    roundRect(ctx,p.x+4,t.y+4,PAD_W-8,t.h-8,Math.max(0,PAD_R-4));
    ctx.fill('evenodd');ctx.restore();
  });
}

function drawBall(b){
  const ultra=selectedMode==='hyper'&&totalHits>=50;
  const onFire=selectedMode==='hyper'&&totalHits>=25;
  ctx.save();
  ctx.shadowColor=ultra?'#cc88ff':onFire?'#ff6600':'#fff';
  ctx.shadowBlur=ultra?28:onFire?24:18;
  ctx.fillStyle=ultra?'#eeddff':onFire?'#ffe066':'#fff';
  ctx.beginPath();ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawFireParticles(){
  fireParticles.forEach(p=>{
    const a=p.life;
    const inner=p.ultra?`rgba(255,255,255,${a})`:`rgba(255,240,80,${a})`;
    const outer=p.ultra?`rgba(200,150,255,${a*0.6})`:`rgba(255,80,0,${a*0.5})`;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
    g.addColorStop(0,inner);g.addColorStop(1,outer);
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
  });
}

function drawPowerups(){
  powerups.forEach(pw=>{
    const pulse=Math.sin(pw.pulse)*3;
    const col=POWERUP_COLORS[pw.type];
    ctx.save();
    ctx.shadowColor=col;ctx.shadowBlur=12+pulse;
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(pw.x,pw.y,pw.r+pulse*0.5,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=col+'33';ctx.fill();
    ctx.fillStyle=col;ctx.font='bold 9px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(POWERUP_LABELS[pw.type],pw.x,pw.y);
    ctx.restore();
  });
}

function drawBackground(){

}

    const r=getOppBtnRect(i);
    const hov=menuState.hoveredOpp===b.id;
    ctx.save();
    ctx.shadowColor=mc.color;ctx.shadowBlur=hov?20:6;
    ctx.strokeStyle=hov?mc.color:'rgba(255,255,255,0.25)';ctx.lineWidth=hov?2:1.5;
    ctx.fillStyle=hov?mc.color+'33':'rgba(255,255,255,0.05)';
    ctx.beginPath();ctx.roundRect(r.x,r.y,r.w,r.h,8);ctx.fill();ctx.stroke();ctx.restore();
    ctx.fillStyle=hov?mc.color:'#fff';ctx.font='bold 14px Courier New';ctx.textAlign='center';
    ctx.fillText(b.label,r.x+r.w/2,r.y+28);
  });
}

function drawGameover(){
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
  const winner=p1.score>=WIN_SCORE?(opponent==='human'?'Player 1':'You'):(opponent==='human'?'Player 2':opponent.toUpperCase()+' CPU');
  ctx.fillStyle='#fff';ctx.font='bold 38px Courier New';ctx.textAlign='center';
  ctx.fillText(`${winner} Wins!`,W/2,H/2-20);
  ctx.font='16px Courier New';ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('Click anywhere or press SPACE to return to menu',W/2,H/2+24);
}

function drawClosed(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 24px Courier New';ctx.textAlign='center';
  ctx.fillText('Your browser blocked auto-close.',W/2,H/2-16);
  ctx.font='14px Courier New';ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillText('Close this tab or window to exit HyperBall.',W/2,H/2+20);
}

// ── Main game update ──────────────────────────────────
function updateGame(){
  if(screen!=='game'||gameState!=='playing')return;
  movePaddles();

  let scored=false;
  for(let i=balls.length-1;i>=0;i--){
    const res=updateBall(balls[i]);
    if(res){
      if(balls.length>1){balls.splice(i,1);}
      else{
        sndScore();
        if(matchStats){
          if(matchStats.lastRally===2)unlockAchievement('pingPong');
          if(matchStats.slowMiss)unlockAchievement('slowMiss');
          if(matchStats.scoredOwnGoal)unlockAchievement('afkVictory');
          matchStats.bestP1Deficit=Math.min(matchStats.bestP1Deficit,p1.score-p2.score);
          if(matchStats.bestP1Deficit<=-5)matchStats.comebackEligible=true;
        }
        // reset paddles to center
        p1.y=H/2-p1.h/2;p2.y=H/2-p2.h/2;
        p1.trail=[];p2.trail=[];
        totalHits=0;fireParticles=[];
        if(matchStats){
          matchStats.movedThisPoint=false;
          matchStats.slowMiss=false;
          matchStats.scoredOwnGoal=false;
        }
        balls=[makeBall(res==='p1'?-1:1)];
        if(p1.score>=WIN_SCORE||p2.score>=WIN_SCORE){
          screen='gameover';
          gameState='paused';
          clearHeldKeys();
          finishMatch();
        }
        else gameState='paused';
        scored=true;break;
      }
    }
  }
  if(scored)return;
  if(selectedMode==='hyper'){updateFireParticles();}
  if(selectedMode==='charged'){updatePowerups();}
}

// ── Render ────────────────────────────────────────────
function render(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  if(screen==='closed'){drawClosed();return;}
  if(screen==='menu'){drawMenu();return;}
  if(screen==='modeSelect'){drawModeSelect();return;}
  if(screen==='gameover'){
    drawBackground();drawHUD();
    drawTrail(p1);drawTrail(p2);
    if(selectedMode==='hyper')drawFireParticles();
    if(selectedMode==='charged')drawPowerups();
    balls.forEach(b=>drawBall(b));
    drawPaddle(p1);drawPaddle(p2);
    drawGameover();return;
  }

  // game
  drawBackground();drawHUD();
  drawPauseButton();
  drawTrail(p1);drawTrail(p2);
  if(selectedMode==='hyper')drawFireParticles();
  if(selectedMode==='charged')drawPowerups();
  balls.forEach(b=>{drawBall(b);drawSpeedIndicator(b);});
  drawPaddle(p1);drawPaddle(p2);
  if(gameState==='paused')drawGameOverlay();
}

function loop(now=performance.now()){
  try{
    const delta=now-lastFrameTime;
    lastFrameTime=now;
    updateSessionStats(delta);
    updateGame();
    render();
  }catch(e){
    console.error(e);
  }
  requestAnimationFrame(loop);
}
loop();
</script>
